    <script>
      // ===== Firebase Configuration =====
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
      // TODO: Replace with actual Firebase config

      /*
        Firestore Security Rules:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /users/{userId} {
              allow read: if request.auth != null;
              allow write: if request.auth != null && request.auth.uid == userId;
            }
            match /dailyScores/{docId} {
              allow read: if true;
              allow write: if request.auth != null && resource == null || resource.data.userId == request.auth.uid;
            }
            match /allTimeScores/{userId} {
              allow read: if true;
              allow write: if request.auth != null && request.auth.uid == userId;
            }
          }
        }

        Required Composite Indexes:
        - Collection: dailyScores — Fields: date ASC, streak DESC, attempts ASC
        - Collection: allTimeScores — Fields: streak DESC, attempts ASC
      */

      let firebaseReady = false;
      let auth = null;
      let db = null;
      let googleProvider = null;
      let currentUser = null;
      let userDisplayName = null;

      try {
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
          const app = firebase.initializeApp(firebaseConfig);
          auth = firebase.auth();
          db = firebase.firestore();
          googleProvider = new firebase.auth.GoogleAuthProvider();
          firebaseReady = true;
        }
      } catch (e) {
        console.warn("Firebase init failed, leaderboard disabled:", e);
        firebaseReady = false;
      }

      // Ad Toggle - Set to true to show ads, false to hide
      const SHOW_ADS = false;

      // Game State
      let currentRoll = null;
      let rollCount = 0;
      let isRolling = false;
      let gameOver = false;
      let bestStreak = 0;
      let totalAttempts = 0;
      let dailyAttempts = 0; // Total attempts today
      let streakAttempts = 0; // Attempts for current streak
      let winStreak = 0; // Consecutive wins in a row
      let dailyWins = 0; // Total wins today
      let allTimeWins = 0; // Total wins all-time
      let todayBestStreak = 0; // Best win streak today
      let allTimeBestStreak = 0; // Best win streak all-time
      let lastPlayedDate = null;

      // UI cycle states
      let winsDisplayMode = "today"; // 'today' or 'alltime'
      let streakDisplayMode = "current"; // 'current', 'todayBest', or 'allTimeBest'
      let attemptsDisplayMode = "today"; // 'today', 'streak', or 'alltime'

      // Leaderboard state
      let currentLeaderboardTab = "daily";

      // Load saved data from localStorage
      function loadGameData() {
        const saved = localStorage.getItem("neverRollOneData");
        if (saved) {
          const data = JSON.parse(saved);
          bestStreak = data.bestStreak || 0;
          totalAttempts = data.totalAttempts || 0;
          dailyAttempts = data.dailyAttempts || 0;
          streakAttempts = data.streakAttempts || 0;
          dailyWins = data.dailyWins || 0;
          winStreak = data.winStreak || 0;
          allTimeWins = data.allTimeWins || 0;
          todayBestStreak = data.todayBestStreak || 0;
          allTimeBestStreak = data.allTimeBestStreak || 0;
          lastPlayedDate = data.lastPlayedDate || null;

          // Check if it's a new day - reset daily stats
          const today = new Date().toDateString();
          if (lastPlayedDate !== today) {
            dailyWins = 0;
            dailyAttempts = 0;
            winStreak = 0;
            streakAttempts = 0;
            todayBestStreak = 0;
            lastPlayedDate = today;
            saveGameData();
          }
        }
      }

      // Save data to localStorage
      function saveGameData() {
        const data = {
          bestStreak,
          totalAttempts,
          dailyAttempts,
          streakAttempts,
          dailyWins,
          winStreak,
          allTimeWins,
          todayBestStreak,
          allTimeBestStreak,
          lastPlayedDate: new Date().toDateString(),
        };
        localStorage.setItem("neverRollOneData", JSON.stringify(data));
      }

      // DOM Elements
      const dice = document.getElementById("dice");
      const diceContainer = document.getElementById("diceContainer");
      const actionButton = document.getElementById("actionButton");
      const gameStatus = document.getElementById("gameStatus");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const intensityMessage = document.getElementById("intensityMessage");
      const liveProb = document.getElementById("liveProb");
      const currentProb = document.getElementById("currentProb");

      // Dice colors
      const diceColors = {
        1: "#dc2626", // red
        2: "#f97316", // orange
        3: "#2563eb", // blue
        4: "#16a34a", // green
        5: "#9333ea", // purple
        6: "#db2777", // pink
      };

      function getIntensityMessage(count) {
        if (count >= 8) return "🔥 LEGENDARY TERRITORY 🔥";
        if (count >= 6) return "⚡ DANGER ZONE ⚡";
        if (count >= 4) return "💎 HEATING UP 💎";
        if (count >= 2) return "🎯 BUILDING MOMENTUM 🎯";
        return "🎲 LET'S GO 🎲";
      }

      // ===== Authentication Functions =====

      async function signInWithGoogle() {
        if (!firebaseReady) return null;
        try {
          const result = await auth.signInWithPopup(googleProvider);
          await checkAndSetDisplayName(result.user);
          return result.user;
        } catch (e) {
          if (e.code !== 'auth/popup-closed-by-user') {
            console.error("Sign-in error:", e);
          }
          return null;
        }
      }

      async function signOutUser() {
        if (!firebaseReady) return;
        try {
          await auth.signOut();
          currentUser = null;
          userDisplayName = null;
          updateLeaderboardAuthUI();
        } catch (e) {
          console.error("Sign-out error:", e);
        }
      }

      async function checkAndSetDisplayName(user) {
        if (!firebaseReady || !user) return;
        try {
          const doc = await db.collection("users").doc(user.uid).get();
          if (doc.exists && doc.data().displayName) {
            userDisplayName = doc.data().displayName;
          } else {
            openDisplayNameModal();
          }
        } catch (e) {
          console.error("Error checking display name:", e);
        }
      }

      function openDisplayNameModal() {
        document.getElementById("displayNameModal").classList.remove("hidden");
        document.getElementById("displayNameInput").value = "";
        document.getElementById("displayNameError").classList.add("hidden");
        document.getElementById("displayNameInput").focus();
      }

      async function saveDisplayName() {
        const input = document.getElementById("displayNameInput");
        const errorEl = document.getElementById("displayNameError");
        const name = input.value.trim();

        // Validate: 3-20 chars, alphanumeric + spaces
        if (name.length < 3 || name.length > 20) {
          errorEl.textContent = "Name must be 3-20 characters.";
          errorEl.classList.remove("hidden");
          return;
        }
        if (!/^[a-zA-Z0-9 ]+$/.test(name)) {
          errorEl.textContent = "Only letters, numbers, and spaces allowed.";
          errorEl.classList.remove("hidden");
          return;
        }

        if (!currentUser) return;

        try {
          await db.collection("users").doc(currentUser.uid).set({
            displayName: name,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          userDisplayName = name;
          document.getElementById("displayNameModal").classList.add("hidden");
          updateLeaderboardAuthUI();
        } catch (e) {
          errorEl.textContent = "Failed to save. Please try again.";
          errorEl.classList.remove("hidden");
          console.error("Save display name error:", e);
        }
      }

      // Auth state listener
      if (firebaseReady) {
        auth.onAuthStateChanged(async (user) => {
          currentUser = user;
          if (user) {
            await checkAndSetDisplayName(user);
          } else {
            userDisplayName = null;
          }
          updateLeaderboardAuthUI();
          updateSaveToLeaderboardButton();
        });
      }

      // ===== Firestore Score Functions =====

      function getTodayString() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function isBetterScore(newScore, oldScore) {
        if (!oldScore) return true;
        if (newScore.streak > oldScore.streak) return true;
        if (newScore.streak === oldScore.streak && newScore.attempts < oldScore.attempts) return true;
        return false;
      }

      async function saveScoreToLeaderboard() {
        if (!firebaseReady) {
          alert("Firebase is not configured. Leaderboard is unavailable.");
          return;
        }

        if (!currentUser) {
          const user = await signInWithGoogle();
          if (!user) return;
        }

        if (!userDisplayName) {
          openDisplayNameModal();
          return;
        }

        const btn = document.getElementById("saveToLeaderboardBtn");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Saving...";
        }

        try {
          const today = getTodayString();
          const newScore = {
            userId: currentUser.uid,
            displayName: userDisplayName,
            streak: winStreak,
            attempts: dailyAttempts,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          };

          // Save daily score
          const dailyDocId = `${currentUser.uid}_${today}`;
          const dailyRef = db.collection("dailyScores").doc(dailyDocId);
          const dailyDoc = await dailyRef.get();

          if (isBetterScore({ streak: newScore.streak, attempts: newScore.attempts }, dailyDoc.exists ? dailyDoc.data() : null)) {
            await dailyRef.set({ ...newScore, date: today });
          }

          // Save all-time score
          const allTimeRef = db.collection("allTimeScores").doc(currentUser.uid);
          const allTimeDoc = await allTimeRef.get();

          if (isBetterScore({ streak: newScore.streak, attempts: newScore.attempts }, allTimeDoc.exists ? allTimeDoc.data() : null)) {
            await allTimeRef.set(newScore);
          }

          showSaveSuccess();
        } catch (e) {
          console.error("Save score error:", e);
          if (btn) {
            btn.disabled = false;
            btn.textContent = "🏆 Save to Leaderboard";
          }
          alert("Failed to save score. Please try again.");
        }
      }

      async function fetchDailyLeaderboard() {
        if (!firebaseReady) return [];
        try {
          const today = getTodayString();
          const snapshot = await db.collection("dailyScores")
            .where("date", "==", today)
            .orderBy("streak", "desc")
            .orderBy("attempts", "asc")
            .limit(10)
            .get();
          return snapshot.docs.map(doc => doc.data());
        } catch (e) {
          console.error("Fetch daily leaderboard error:", e);
          return [];
        }
      }

      async function fetchAllTimeLeaderboard() {
        if (!firebaseReady) return [];
        try {
          const snapshot = await db.collection("allTimeScores")
            .orderBy("streak", "desc")
            .orderBy("attempts", "asc")
            .limit(25)
            .get();
          return snapshot.docs.map(doc => doc.data());
        } catch (e) {
          console.error("Fetch all-time leaderboard error:", e);
          return [];
        }
      }

      async function fetchUserBest(tab) {
        if (!firebaseReady || !currentUser) return null;
        try {
          if (tab === "daily") {
            const today = getTodayString();
            const doc = await db.collection("dailyScores").doc(`${currentUser.uid}_${today}`).get();
            return doc.exists ? doc.data() : null;
          } else {
            const doc = await db.collection("allTimeScores").doc(currentUser.uid).get();
            return doc.exists ? doc.data() : null;
          }
        } catch (e) {
          console.error("Fetch user best error:", e);
          return null;
        }
      }

      async function getUserRank(tab) {
        if (!firebaseReady || !currentUser) return null;
        try {
          const userBest = await fetchUserBest(tab);
          if (!userBest) return null;

          let query;
          if (tab === "daily") {
            const today = getTodayString();
            // Count entries with better scores
            const betterStreak = await db.collection("dailyScores")
              .where("date", "==", today)
              .where("streak", ">", userBest.streak)
              .get();

            const sameStreakBetterAttempts = await db.collection("dailyScores")
              .where("date", "==", today)
              .where("streak", "==", userBest.streak)
              .where("attempts", "<", userBest.attempts)
              .get();

            return betterStreak.size + sameStreakBetterAttempts.size + 1;
          } else {
            const betterStreak = await db.collection("allTimeScores")
              .where("streak", ">", userBest.streak)
              .get();

            const sameStreakBetterAttempts = await db.collection("allTimeScores")
              .where("streak", "==", userBest.streak)
              .where("attempts", "<", userBest.attempts)
              .get();

            return betterStreak.size + sameStreakBetterAttempts.size + 1;
          }
        } catch (e) {
          console.error("Get user rank error:", e);
          return null;
        }
      }

      function rollDice() {
        if (gameOver || isRolling || rollCount >= 10) return;

        isRolling = true;
        diceContainer.classList.add("bounce-animation");

        // Animate rolling
        let rolls = 0;
        const rollInterval = setInterval(() => {
          const tempRoll = Math.floor(Math.random() * 6) + 1;
          dice.style.backgroundColor = diceColors[tempRoll];
          dice.className =
            "w-40 h-40 rounded-3xl shadow-2xl flex items-center justify-center transform transition-all duration-100";
          dice.innerHTML = `<div class="text-8xl font-black text-white drop-shadow-2xl">${tempRoll}</div>`;
          rolls++;

          if (rolls >= 10) {
            clearInterval(rollInterval);
            finishRoll();
          }
        }, 100);
      }

      function finishRoll() {
        setTimeout(() => {
          const result = Math.floor(Math.random() * 6) + 1;
          currentRoll = result;

          dice.style.backgroundColor = diceColors[result];
          dice.className =
            "w-40 h-40 rounded-3xl shadow-2xl flex items-center justify-center transform transition-all duration-300 hover:scale-105";

          if (result === 1) {
            dice.classList.add("scale-110", "ring-8", "ring-red-500/50");
          } else if (result === 2) {
            dice.classList.add("ring-4", "ring-orange-500/50");
          }

          dice.innerHTML = `<div class="text-8xl font-black text-white drop-shadow-2xl">${result}</div>`;

          diceContainer.classList.remove("bounce-animation");
          isRolling = false;

          if (result === 1) {
            // LOSS
            gameOver = true;
            totalAttempts++;
            dailyAttempts++;
            streakAttempts++;

            if (rollCount > bestStreak) {
              bestStreak = rollCount;
            }

            if (winStreak > 0) {
              streakAttempts = 0; // Reset streak attempts on loss
            }

            winStreak = 0; // Reset win streak on loss

            // Build personal best info for signed-in users
            let personalBestHtml = '';
            if (firebaseReady && currentUser) {
              fetchUserBest('alltime').then(best => {
                if (best) {
                  const bestEl = document.getElementById('lossPersonalBest');
                  if (bestEl) {
                    bestEl.innerHTML = `<div class="text-sm text-gray-400 mt-3">Your best: ${best.streak} streak in ${best.attempts} attempts</div>`;
                  }
                }
              });
            }

            gameStatus.innerHTML = `
                        <div class="pulse-slow">
                            <div class="text-4xl font-black text-red-500 mb-2 drop-shadow-lg">
                                💀 BUSTED! 💀
                            </div>
                            <div class="text-xl text-red-300">
                                You rolled a 1 on roll #${rollCount + 1}
                            </div>
                            ${
                              rollCount >= 7
                                ? `<div class="text-lg text-yellow-400 mt-2 font-bold">SO CLOSE! Only ${
                                    10 - rollCount
                                  } away from victory!</div>`
                                : ""
                            }
                            <div id="lossPersonalBest"></div>
                        </div>
                    `;
            gameStatus.classList.remove("hidden");

            actionButton.textContent = "START OVER";
            actionButton.className =
              "px-12 py-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-xl font-black rounded-xl shadow-2xl transform hover:scale-105 transition-all duration-200 uppercase tracking-wider border-2 border-green-400";
          } else {
            // SUCCESS
            rollCount++;

            if (rollCount === 10) {
              // WIN!
              gameOver = true;
              totalAttempts++;
              dailyAttempts++;
              bestStreak = 10;
              dailyWins++; // Increment total daily wins
              allTimeWins++; // Increment all-time wins
              winStreak++; // Increment consecutive win streak

              // Update best streaks
              if (winStreak > todayBestStreak) {
                todayBestStreak = winStreak;
              }
              if (winStreak > allTimeBestStreak) {
                allTimeBestStreak = winStreak;
              }

              gameStatus.innerHTML = `
                            <div class="bounce-animation">
                                <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 mb-2 drop-shadow-2xl">
                                    🎉 JACKPOT! 🎉
                                </div>
                                <div class="text-2xl text-green-400 font-bold">
                                    YOU BEAT THE ODDS!
                                </div>
                                <div class="text-sm text-gray-400 mt-2">
                                    Only 16.2% of players make it this far!
                                </div>
                            </div>
                        `;
              gameStatus.classList.remove("hidden");

              actionButton.insertAdjacentHTML(
                "beforebegin",
                '<button onclick="shareScore()" class="px-8 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold rounded-lg shadow-lg transform hover:scale-105 transition-all duration-200">📤 Share Your Victory</button>'
              );

              // Add save to leaderboard button
              if (firebaseReady) {
                actionButton.insertAdjacentHTML(
                  "beforebegin",
                  '<button id="saveToLeaderboardBtn" onclick="saveScoreToLeaderboard()" class="px-8 py-3 bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 text-white font-bold rounded-lg shadow-lg transform hover:scale-105 transition-all duration-200">🏆 Save to Leaderboard</button>'
                );
              }

              actionButton.textContent = "🔄 CONTINUE STREAK";
              actionButton.className =
                "px-12 py-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-xl font-black rounded-xl shadow-2xl transform hover:scale-105 transition-all duration-200 uppercase tracking-wider border-2 border-green-400";
            } else {
              actionButton.textContent = "🎲 ROLL AGAIN";
            }
          }

          updateStats();
        }, 100);
      }

      function reset() {
        currentRoll = null;
        rollCount = 0;
        gameOver = false;

        dice.style.backgroundColor = "";
        dice.className =
          "w-40 h-40 bg-slate-700 rounded-3xl shadow-2xl flex items-center justify-center border-4 border-dashed border-purple-500/50";
        dice.innerHTML = '<span class="text-6xl">🎲</span>';

        gameStatus.classList.add("hidden");
        gameStatus.innerHTML = "";

        // Remove share button if it exists
        const shareButton = document.querySelector(
          'button[onclick="shareScore()"]'
        );
        if (shareButton) {
          shareButton.remove();
        }

        // Remove save to leaderboard button if it exists
        const saveBtn = document.getElementById("saveToLeaderboardBtn");
        if (saveBtn) {
          saveBtn.remove();
        }

        actionButton.textContent = "🎲 START GAME";
        actionButton.className =
          "px-12 py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white text-xl font-black rounded-xl shadow-2xl transform hover:scale-105 transition-all duration-200 uppercase tracking-wider border-2 border-purple-400";

        updateStats();
      }

      // Share score function (Wordle-style)
      function shareScore() {
        const today = new Date().toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
        const shareText = `Never Roll a 1 🎲 ${today}

Win Streak: ${winStreak} 🔥
Total Attempts: ${totalAttempts}
Today's Wins: ${dailyWins}

neverrollone.com`;

        // Try to use native share API (mobile)
        if (navigator.share) {
          navigator
            .share({
              text: shareText,
            })
            .catch((err) => console.log("Share cancelled"));
        } else {
          // Fallback: Copy to clipboard
          navigator.clipboard.writeText(shareText).then(() => {
            // Show copied message
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = "✅ Copied!";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 2000);
          });
        }
      }

      actionButton.addEventListener("click", () => {
        if (gameOver) {
          reset();
        } else {
          rollDice();
        }
      });

      // Handle Enter key for display name input
      document.getElementById("displayNameInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveDisplayName();
      });

      // Initialize - Load saved data
      loadGameData();
      updateStats();

      // Handle ad visibility based on SHOW_ADS toggle
      const topBanner = document.getElementById("topBannerAd");
      const bottomBanner = document.getElementById("bottomBannerAd");
      const mainContent = document.getElementById("mainContent");

      if (!SHOW_ADS) {
        topBanner.style.display = "none";
        bottomBanner.style.display = "none";
        // Add top padding when ads are hidden
        mainContent.style.paddingTop = "2rem";
      }
    </script>
  </body>
</html>
