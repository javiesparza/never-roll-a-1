<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Never Roll a 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white min-h-screen"
  >
    <div class="max-w-4xl mx-auto p-8">
      <div class="mb-8">
        <a href="index.html" class="text-purple-400 hover:text-purple-300"
          >← Back to Game</a
        >
      </div>

      <h1 class="text-4xl font-bold mb-8">Contact Us</h1>

      <div class="bg-slate-800/70 backdrop-blur-xl rounded-2xl p-8">
        <p class="text-gray-300 mb-6">
          Have questions, feedback, or found a bug? We'd love to hear from you!
        </p>

        <div class="space-y-4">
          <div class="bg-slate-700/50 rounded-lg p-6">
            <h2 class="text-xl font-bold mb-2">Email</h2>
            <p class="text-purple-400">contact@neverrollone.com</p>
          </div>

          <div class="bg-slate-700/50 rounded-lg p-6">
            <h2 class="text-xl font-bold mb-2">Report a Bug</h2>
            <p class="text-gray-300">
              Found something broken? Let us know and we'll fix it ASAP.
            </p>
          </div>

          <div class="bg-slate-700/50 rounded-lg p-6">
            <h2 class="text-xl font-bold mb-2">Suggestions</h2>
            <p class="text-gray-300">
              Have ideas for new features or game modes? We're all ears!
            </p>
          </div>
        </div>
      </div>

      <div class="mt-8 text-center">
        <a
          href="index.html"
          class="inline-block px-8 py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold rounded-xl"
        >
          Back to Game
        </a>
      </div>
    </div>
  </body>
</html>
